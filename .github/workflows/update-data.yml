name: Auto Update Warehouse Data

on:
  # 1. 定时触发：每 30 分钟运行一次 (GitHub 可能会稍有延迟)
  schedule:
    - cron: '*/30 * * * *'
  
  # 2. 允许在 GitHub 网页上手动点击按钮触发
  workflow_dispatch:
  
  # 3. 当你推送代码修改时触发 (可选，但推荐)
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 赋予部署到 GitHub Pages 所需的权限
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      # 步骤 1: 拉取你的代码仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤 2: 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用 3.10 版本，完美支持 zoneinfo

      # 步骤 3: 安装 Python 依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy plotly requests pytz openpyxl

      # 步骤 4: 运行你的 Python 脚本生成 index.html
      - name: Generate 3D Warehouse HTML
        run: python 3Dwh.py

      # 步骤 5: 安全检查 (确认 index.html 真的生成了)
      - name: Check if HTML exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ 错误: 找不到 index.html！Python 脚本可能运行失败了。"
            echo "当前目录文件列表："
            ls -l
            exit 1
          fi
          echo "✅ 成功生成 index.html，准备部署..."

      # 步骤 6: 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 步骤 7: 上传生成的文件 (整个根目录，包含 index.html)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      # 步骤 8: 正式部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
