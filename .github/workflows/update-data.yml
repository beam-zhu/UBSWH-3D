name: Auto Update Warehouse Data

on:
  schedule:
    # 每 30 分钟运行一次（UTC 时间，全球通用）
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy plotly requests openpyxl
    
    - name: Run Python script
      run: python 3Dwh.py
      env:
        GITHUB_ACTIONS: "true"  # 告诉脚本在 GitHub 环境中运行
    
    - name: Rename and commit HTML
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        mv Urban_Sales_Twin_View.html index.html
        git add index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update warehouse data [skip ci]"
        git push
