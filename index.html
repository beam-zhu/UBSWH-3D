<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>UBSWH3D</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #F8FAFC; }
        #plotly-div { width: 100%; height: 100vh; touch-action: none; } /* 🌟 关键修复：阻止浏览器默认手势干扰 */
        
        #data-timestamp-box { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.95); padding: 10px 14px; border-radius: 10px; box-shadow: 0 4px 12px rgba(15,23,42,0.15); z-index: 9999; border: 1px solid #E2E8F0; text-align: center; }
        #data-timestamp { font-size: 13px; font-weight: bold; color: #0F172A; margin-bottom: 4px; }
        #refresh-btn { background: #3B82F6; color: white; border: none; border-radius: 4px; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; }
        #refresh-btn:hover { background: #2563EB; }
        #refresh-btn:disabled { background: #94A3B8; cursor: not-allowed; }
        
        #super-legend-panel { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.98); padding: 16px; border-radius: 12px; box-shadow: 0 6px 20px rgba(15,23,42,0.15); z-index: 9999; width: 380px; border: 1px solid #E2E8F0; max-height: 90vh; overflow-y: auto; transition: transform 0.3s ease, opacity 0.3s ease; }
        #super-legend-panel.collapsed { transform: translateX(-420px); opacity: 0; pointer-events: none; }
        
        #panel-expand-strip { position: absolute; top: 50%; left: 0; transform: translateY(-50%); width: 28px; height: 80px; background: rgba(59, 130, 246, 0.9); color: white; border-radius: 0 8px 8px 0; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 9998; font-size: 16px; font-weight: bold; box-shadow: 2px 0 8px rgba(0,0,0,0.15); }
        #panel-expand-strip.show { display: flex; }
        #panel-expand-strip:hover { width: 32px; background: #3B82F6; }
        
        #menu-toggle-btn { position: absolute; top: 20px; left: 20px; background: #3B82F6; color: white; border: none; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 9998; box-shadow: 0 4px 12px rgba(59,130,246,0.3); display: none; }
        #fullscreen-btn { position: absolute; top: 20px; right: 20px; background: #10B981; color: white; border: none; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 9998; box-shadow: 0 4px 12px rgba(16,185,129,0.3); display: none; }
        #edit-mode-btn { position: absolute; top: 80px; right: 20px; background: #F59E0B; color: white; border: none; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 9998; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
        #edit-mode-btn.active { background: #10B981; }
        
        .switch-btn { flex: 1; padding: 8px; font-size: 11px; font-weight: bold; border: 2px solid #CBD5E1; cursor: pointer; text-align: center; border-radius: 6px; background: #FFF; color: #64748B; }
        .switch-btn.active { background: #10B981; color: white; border-color: #047857; }
        .switch-btn.active-actual { background: #3B82F6; color: white; border-color: #1D4ED8; }
        #legend-list { display: flex; flex-direction: column; gap: 8px; }
        .legend-row { display: flex; align-items: center; gap: 6px; background: #F8FAFC; padding: 5px 8px; border-radius: 6px; border: 1px solid #E2E8F0; }
        .color-box { position: relative; width: 22px; height: 20px; overflow: hidden; border-radius: 4px; border: 1px solid #CBD5E1; flex-shrink: 0; cursor: pointer; }
        .legend-label { font-size: 11px; font-weight: bold; color: #1E293B; flex: 1; min-width: 100px; }
        .action-btn { background: none; border: 1px solid #CBD5E1; border-radius: 4px; cursor: pointer; font-size: 12px; padding: 0 4px; }
        .action-btn:hover { background: #F1F5F9; }
        .edit-btn { background: #FEF3C7; color: #D97706; border-color: #FCD34D; }
        .delete-btn { background: #FEE2E2; color: #EF4444; border-color: #FCA5A5; }
        .reset-btn { background: #E0F2FE; color: #0284C7; border-color: #7DD3FC; }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .spinner { width: 50px; height: 50px; border: 4px solid #E2E8F0; border-top: 4px solid #3B82F6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text { margin-top: 20px; font-size: 16px; color: #0F172A; font-weight: bold; }
        #error-message { margin-top: 10px; font-size: 14px; color: #EF4444; max-width: 600px; text-align: center; padding: 0 20px; white-space: pre-line; }
        
        #planning-tools-box { background: #F8FAFC; padding: 8px; border-radius: 8px; border: 1px dashed #5B7B9C; margin-bottom: 12px; display: none; }
        #planning-tools-box.show { display: block; }
        
        #password-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99999; justify-content: center; align-items: center; }
        #password-modal.show { display: flex; }
        .password-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 400px; width: 90%; }
        .password-box h3 { margin-bottom: 20px; color: #0F172A; }
        .password-box input { width: 100%; padding: 12px; border: 2px solid #E2E8F0; border-radius: 6px; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        .password-box input:focus { outline: none; border-color: #3B82F6; }
        .password-box .btn-group { display: flex; gap: 10px; }
        .password-box button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .password-box .btn-confirm { background: #3B82F6; color: white; }
        .password-box .btn-cancel { background: #E2E8F0; color: #64748B; }
        .password-error { color: #EF4444; font-size: 12px; margin-bottom: 10px; display: none; }
        
        @media (max-width: 768px) {
            #menu-toggle-btn, #fullscreen-btn, #edit-mode-btn { display: block; }
            #fullscreen-btn { top: 70px; }
            #edit-mode-btn { top: 120px; right: 10px; padding: 10px 14px; font-size: 12px; }
            #super-legend-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; max-height: 100vh; border-radius: 0; padding: 20px; transform: translateX(-100%); z-index: 10000; }
            #super-legend-panel.show { transform: translateX(0); }
            #super-legend-panel.collapsed { transform: translateX(-100%); }
            #panel-expand-strip { width: 24px; height: 60px; font-size: 14px; }
            #data-timestamp-box { top: 10px; right: 10px; padding: 8px 10px; display: none; }
            .legend-row { padding: 10px; }
            .legend-label { font-size: 13px; }
            .action-btn { font-size: 14px; padding: 4px 8px; }
            .switch-btn { padding: 12px; font-size: 13px; }
        }
        
        body.fullscreen #data-timestamp-box, body.fullscreen #super-legend-panel, body.fullscreen #menu-toggle-btn, body.fullscreen #fullscreen-btn, body.fullscreen #edit-mode-btn, body.fullscreen #panel-expand-strip { display: none !important; }
        #exit-fullscreen-btn { position: absolute; top: 20px; right: 20px; background: #EF4444; color: white; border: none; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: bold; cursor: pointer; z-index: 9998; display: none; }
        body.fullscreen #exit-fullscreen-btn { display: block; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><div id="loading-text">正在加载仓库数据...</div><div id="error-message"></div></div>
    <div id="plotly-div"></div>
    <button id="menu-toggle-btn" onclick="toggleMenu()">☰ 菜单</button>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏</button>
    <button id="edit-mode-btn" onclick="toggleEditMode()">🔒 编辑模式</button>
    <button id="exit-fullscreen-btn" onclick="toggleFullscreen()">✕ 退出全屏</button>
    <div id="panel-expand-strip" onclick="expandPanel()">▶</div>
    <div id="data-timestamp-box"><div id="data-timestamp">数据加载中...</div><button id="refresh-btn" onclick="refreshData()">🔄 刷新数据</button></div>
    
    <div id="super-legend-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button onclick="collapsePanel()" style="background: #64748B; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer;">◀ 收起</button>
        </div>
        <div style="background: #F1F5F9; padding: 4px; border-radius: 8px; display: flex; gap: 4px; margin-bottom: 12px; border: 1px solid #E2E8F0;">
            <div id="view-plan-btn" class="switch-btn active" onclick="switchGlobalView('PLAN')">🟢 规划预期分布</div>
            <div id="view-actual-btn" class="switch-btn" onclick="switchGlobalView('ACTUAL')">🔵 实际库存大盘</div>
        </div>
        <div style="border-bottom: 2px solid #F1F5F9; padding-bottom: 6px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
            <h4 id="legend-panel-title" style="margin: 0; color: #0F172A; font-size: 13px;">📊 预期规划品牌图例</h4>
            <button id="reset-master-btn" onclick="resetToDefault()" style="background:#EF4444; color:white; border:none; border-radius:4px; padding:4px 10px; font-size:10px; cursor:pointer;">恢复初始</button>
        </div>
        <div id="planning-tools-box">
            <label style="font-size: 11px; color: #0F172A; display:block; margin-bottom:4px; font-weight: bold;">📐 规划库位快速改色工具:</label>
            <textarea id="target-loc" rows="2" placeholder="输入连续范围如：Q01-01~Q01-04..." style="width: 100%; padding: 4px; border: 1px solid #CBD5E1; border-radius: 4px; box-sizing: border-box; font-size: 11px;"></textarea>
            <div style="display: flex; gap: 4px; margin-top: 6px;">
                <input type="text" id="new-brand" placeholder="指定新品牌" style="flex:1; padding: 4px; border: 1px solid #CBD5E1; border-radius: 4px; font-size: 11px;">
                <input type="color" id="new-color" value="#DF9F57" style="width: 24px; height: 22px; border: 1px solid #CBD5E1; border-radius: 4px; cursor: pointer;">
                <button onclick="applyLocationChange()" style="background: #5B7B9C; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer;">修改</button>
            </div>
        </div>
        <div id="legend-list"></div>
    </div>
    
    <div id="password-modal">
        <div class="password-box">
            <h3>🔐 输入编辑密码</h3>
            <div class="password-error" id="password-error">密码错误，请重试</div>
            <input type="password" id="password-input" placeholder="请输入密码" onkeypress="if(event.key==='Enter')confirmPassword()">
            <div class="btn-group">
                <button class="btn-cancel" onclick="closePasswordModal()">取消</button>
                <button class="btn-confirm" onclick="confirmPassword()">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        const PLAN_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vStLtLccpDSfrf_yU_T9WrNcZufN29BqkDsVS2r9ql1INK_61uA8UetkiW4DZ4_dv63o-DHzFz0tOAq/pub?gid=1276542862&single=true&output=csv";
        const ACTUAL_XLSX_URL = "https://docs.google.com/spreadsheets/d/1w1RvdGh_5LfIaxKHv0P-egK5kKzjLVZx/export?format=xlsx";
        const PASSWORD_HASH = "a5c8c0b6d8e8f8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8e8";
        const CORS_PROXIES = ["https://corsproxy.io/?", "https://api.allorigins.win/raw?url="];
        
        const GLOBAL_BRAND_COLORS = {'LINSY': '#D68F68', 'A区 (oversize沙发区)': '#7DA28A', 'B区 (沙发 Backup区)': '#6C8EA4', 'G区不良品区': '#949BA2', 'Replica 区域': '#D4CBBE', 'MODE 椅子区': '#9E7E73', 'LOFT 区': '#8B7AA3', 'Solidwood 区': '#C29B85', 'Boori区': '#C87284', 'BOHOBOHO & Alpaka & Boori区': '#2C2D30', '补件区': '#8A5A58', 'loft & solidwood backup区': '#EEDCA5', '地面专属区': '#334155', '[当前空置]': '#E2E8F0', '[⚠️超过4品牌严重混放]': '#64748B'};
        const DEFAULT_CONFIG = [{ org_name: "LINSY", color: "#D68F68", label: "LINSY" }, { org_name: "A区 (oversize沙发区)", color: "#7DA28A", label: "A区 (oversize沙发区)" }, { org_name: "B区 (沙发 Backup区)", color: "#6C8EA4", label: "B区 (沙发 Backup区)" }, { org_name: "G区不良品区", color: "#949BA2", label: "G区不良品区" }, { org_name: "Replica 区域", color: "#D4CBBE", label: "Replica 区域" }, { org_name: "MODE 椅子区", color: "#9E7E73", label: "MODE 椅子区" }, { org_name: "LOFT 区", color: "#8B7AA3", label: "LOFT 区" }, { org_name: "Solidwood 区", color: "#C29B85", label: "Solidwood 区" }, { org_name: "Boori区", color: "#C87284", label: "Boori区" }, { org_name: "BOHOBOHO & Alpaka & Boori区", color: "#2C2D30", label: "BOHOBOHO & Alpaka & Boori区" }, { org_name: "补件区", color: "#8A5A58", label: "补件区" }, { org_name: "loft & solidwood backup区", color: "#EEDCA5", label: "loft & solidwood backup区" }];
        
        let GLOBAL_CURRENT_VIEW = "PLAN", runtime_config = [...DEFAULT_CONFIG], cell_override_db = {}, server_data_cache = [], lastRefreshTime = 0, isEditMode = false;
        
        try {
            const s = localStorage.getItem("warehouse_twin_master_2026");
            if (s) {
                runtime_config = JSON.parse(s).filter((i,_,a) => a.findIndex(x => x.org_name === i.org_name) === _);
                runtime_config.forEach(i => { if(i.color) GLOBAL_BRAND_COLORS[i.org_name] = i.color; });
            }
            const o = localStorage.getItem("warehouse_twin_cell_overrides_2026");
            if(o) cell_override_db = JSON.parse(o);
            if(sessionStorage.getItem("warehouse_edit_mode")==="true") { isEditMode = true; updateEditModeButton(); }
        } catch(e) {}
        
        const COL_WIDTH=5.0, DEPTH=3.0, LVL_HEIGHT=4.0, EASTERN_ALIGN_X=65.0, SOUTH_BASE_Y=95.0, NORTH_BASE_Y=145.0;
        const XWT_ZONE_COL_ORDER={5:0,1:1,2:2,3:3,4:4}, AISLE_GAP=6.0, SHRINK=1.0;

        // 🔐 密码相关
        async function hashPassword(p) { return Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p)))).map(b=>b.toString(16).padStart(2,'0')).join(''); }
        window.generatePasswordHash = async function(p) { const h = await hashPassword(p); console.log('='.repeat(50)+'\n✅ 密码哈希值:\n'+h+'\n'+ '='.repeat(50)+'\n📝 替换 index.html 中的 PASSWORD_HASH 变量即可'); return h; };
        function toggleEditMode() { if(isEditMode){ isEditMode=false; sessionStorage.removeItem("warehouse_edit_mode"); updateEditModeButton(); renderControlPanel(); } else { document.getElementById('password-modal').classList.add('show'); document.getElementById('password-input').value=''; document.getElementById('password-error').style.display='none'; setTimeout(()=>document.getElementById('password-input').focus(),100); } }
        async function confirmPassword() { const p=document.getElementById('password-input').value; if(await hashPassword(p)===PASSWORD_HASH){ isEditMode=true; sessionStorage.setItem("warehouse_edit_mode","true"); closePasswordModal(); updateEditModeButton(); renderControlPanel(); } else { document.getElementById('password-error').style.display='block'; document.getElementById('password-input').value=''; document.getElementById('password-input').focus(); } }
        function closePasswordModal() { document.getElementById('password-modal').classList.remove('show'); }
        function updateEditModeButton() { document.getElementById('edit-mode-btn').innerText = isEditMode ? '🔓 退出编辑' : '🔒 编辑模式'; document.getElementById('edit-mode-btn').classList.toggle('active', isEditMode); document.getElementById('planning-tools-box').classList.toggle('show', isEditMode); }
        
        // 🎯 面板控制（纯按钮，无手势冲突）
        function collapsePanel() { document.getElementById('super-legend-panel').classList.add('collapsed'); document.getElementById('super-legend-panel').classList.remove('show'); document.getElementById('panel-expand-strip').classList.add('show'); }
        function expandPanel() { const p=document.getElementById('super-legend-panel'); p.classList.remove('collapsed'); if(window.innerWidth<=768) p.classList.add('show'); document.getElementById('panel-expand-strip').classList.remove('show'); }
        function toggleMenu() { document.getElementById('super-legend-panel').classList.toggle('show'); }
        function toggleFullscreen() { document.body.classList.toggle('fullscreen'); setTimeout(()=>Plotly.Plots.resize(document.getElementById('plotly-div')),100); }
        
        // 🌐 数据抓取
        async function fetchWithProxy(url, isBin=false) {
            try { const r=await fetch(url); if(r.ok) return isBin?await r.arrayBuffer():await r.text(); } catch{}
            for(let i=0;i<CORS_PROXIES.length;i++) { try { const r=await fetch(CORS_PROXIES[i]+encodeURIComponent(url)); if(r.ok) { const d=isBin?await r.arrayBuffer():await r.text(); if(isBin){const b=new Uint8Array(d);if(b[0]===0x50&&b[1]===0x4B)return d;} else if(d.includes(',')) return d; } } catch{} }
            throw new Error("数据源连接失败，请检查网络或URL");
        }
        
        function getPlannedInfo(z,c,l,ig=false) { if(ig)return['地面专属区',GLOBAL_BRAND_COLORS['地面专属区']]; if(['C','D','E','F','P'].includes(z))return['LINSY',GLOBAL_BRAND_COLORS['LINSY']]; if(z==='A')return['A区 (oversize沙发区)',GLOBAL_BRAND_COLORS['A区 (oversize沙发区)']]; if(z==='B')return 2<=l&&l<=5?['B区 (沙发 Backup区)',GLOBAL_BRAND_COLORS['B区 (沙发 Backup区)']]:['LINSY',GLOBAL_BRAND_COLORS['LINSY']]; if(z==='G')return['G区不良品区',GLOBAL_BRAND_COLORS['G区不良品区']]; if(['H','J','K'].includes(z))return(z==='K'&&10<=c&&c<=13&&[1,4,5].includes(l))?['Replica 区域',GLOBAL_BRAND_COLORS['Replica 区域']]:['LINSY',GLOBAL_BRAND_COLORS['LINSY']]; if(z==='L')return l===5?['MODE 椅子区',GLOBAL_BRAND_COLORS['MODE 椅子区']]:['LOFT 区',GLOBAL_BRAND_COLORS['LOFT 区']]; if(z==='M')return['LOFT 区',GLOBAL_BRAND_COLORS['LOFT 区']]; if(z==='Q')return l===5?['MODE 椅子区',GLOBAL_BRAND_COLORS['MODE 椅子区']]:2<=l&&l<=4?['loft & solidwood backup区',GLOBAL_BRAND_COLORS['loft & solidwood backup区']]:['LOFT 区',GLOBAL_BRAND_COLORS['LOFT 区']]; if(z==='N')return['Solidwood 区',GLOBAL_BRAND_COLORS['Solidwood 区']]; if(['T','W','X'].includes(z))return(z==='T'&&c===4)?['补件区',GLOBAL_BRAND_COLORS['补件区']]:['Solidwood 区',GLOBAL_BRAND_COLORS['Solidwood 区']]; if(z==='Y')return[5,6].includes(c)?['BOHOBOHO & Alpaka & Boori区',GLOBAL_BRAND_COLORS['BOHOBOHO & Alpaka & Boori区']]:['Boori区',GLOBAL_BRAND_COLORS['Boori区']]; return['其他区域','#8F9985']; }
        
        function getAbsoluteCoords(z,c,l) {
            const h=(l-1)*LVL_HEIGHT; let x,y;
            if(z==='Y'){x=EASTERN_ALIGN_X-(c-1)*COL_WIDTH;y=NORTH_BASE_Y+15;}
            else if(['X','W','T'].includes(z)){const s=XWT_ZONE_COL_ORDER[c]!==undefined?XWT_ZONE_COL_ORDER[c]:c-1;x=EASTERN_ALIGN_X-s*COL_WIDTH;y=z==='X'?NORTH_BASE_Y:z==='W'?NORTH_BASE_Y-DEPTH:NORTH_BASE_Y-DEPTH*2-12;}
            else if(z==='H'){x=55.8;y=c<=10?SOUTH_BASE_Y-(c-1)*COL_WIDTH-COL_WIDTH/2:SOUTH_BASE_Y+(c-10)*COL_WIDTH-COL_WIDTH/2;}
            else if(z==='J'){x=55-DEPTH-0.8;y=c<=11?SOUTH_BASE_Y-(c-1)*COL_WIDTH-COL_WIDTH/2:SOUTH_BASE_Y+(c-11)*COL_WIDTH-COL_WIDTH/2;}
            else if(z==='K'){x=30.8;y=SOUTH_BASE_Y-(c-1)*COL_WIDTH-COL_WIDTH/2;}
            else if(z==='L'){x=30-DEPTH-0.8;y=SOUTH_BASE_Y-(c-1)*COL_WIDTH-COL_WIDTH/2;}
            else if(z==='P'){x=30.8;y=SOUTH_BASE_Y+(c-1)*COL_WIDTH+COL_WIDTH/2;}
            else if(z==='Q'){x=30-DEPTH-0.8;y=SOUTH_BASE_Y+(c-1)*COL_WIDTH+COL_WIDTH/2;}
            else if(z==='M'){x=5;let o=(c-1)*COL_WIDTH+COL_WIDTH/2;if(c>=3)o+=AISLE_GAP;if(c>=6)o+=AISLE_GAP;if(c>=9)o+=AISLE_GAP;if(c>=12)o+=AISLE_GAP;y=SOUTH_BASE_Y-o;}
            else if(z==='N'){x=5;let o=(c-1)*COL_WIDTH+COL_WIDTH/2+AISLE_GAP;if(c>=3)o+=AISLE_GAP;y=SOUTH_BASE_Y+o;}
            else if(z==='A'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=SOUTH_BASE_Y;}
            else if(z==='B'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=80-DEPTH/2;}
            else if(z==='C'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=80-DEPTH/2-DEPTH;}
            else if(z==='D'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=56-DEPTH/2;}
            else if(z==='E'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=56-DEPTH/2-DEPTH;}
            else if(z==='F'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=32-DEPTH/2;}
            else if(z==='G'){x=82+(c-1)*COL_WIDTH+COL_WIDTH/2;y=32-DEPTH/2-DEPTH;}
            else{x=200;y=50;}
            return[x,y,h];
        }
        
        async function fetchPlanData() { const t=await fetchWithProxy(PLAN_CSV_URL); const locs=[]; t.split('\n').forEach(l=>l.split(',').forEach(c=>{const m=c.trim().match(/([A-Z]+)(\d+)-(\d+)/); if(m)locs.push({loc:c.trim(),zone:m[1],col:+m[2],lvl:+m[3],is_ground:false});})); return locs; }
        async function fetchActualData() { const u=ACTUAL_XLSX_URL+(ACTUAL_XLSX_URL.includes('?')?'&':'?')+'t='+Date.now(); const ab=await fetchWithProxy(u,true); const wb=XLSX.read(ab,{type:'array'}); const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,skiprows:5}); const db={}; data.forEach(r=>{if(r.length<7)return;const l=String(r[1]||'').trim();if(!l||l==='nan'||l.includes('$')||l.includes(' ')||!/^[A-Z]+\d+-\d+$/.test(l)&&!/^[A-Z]*\d*$/.test(l))return;const s=String(r[2]||'').trim();const b=String(r[3]||'Other').trim();const q=parseFloat(r[6])||0;if(!db[l])db[l]=[];db[l].push({sku:s.includes('~')?s.split('~').pop():s,brand:b,qty:Math.floor(q)});if(!GLOBAL_BRAND_COLORS[b]){const h=Array.from(b).reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0);GLOBAL_BRAND_COLORS[b]=`hsl(${Math.abs(h)%360},65%,50%)`;}}); return db; }
        
        function render3D(locs, db) {
            locs.forEach(l=>{const[x,y,z]=getAbsoluteCoords(l.zone,l.col,l.lvl);l.X=x;l.Y=y;l.Z=z;const[b,c]=getPlannedInfo(l.zone,l.col,l.lvl,l.is_ground);l.brand=b;l.color=c;});
            server_data_cache=locs.map(l=>{const items=db[l.loc]||[];const brands=[...new Set(items.map(i=>i.brand).filter(Boolean))];let sl=[];if(brands.length===0)sl=[{brand:"[当前空置]",color:GLOBAL_BRAND_COLORS['[当前空置]'],items:[]}];else if(brands.length>4)sl=[{brand:"[⚠️超过4品牌严重混放]",color:GLOBAL_BRAND_COLORS['[⚠️超过4品牌严重混放]'],items:items}];else brands.forEach(b=>sl.push({brand:b,color:GLOBAL_BRAND_COLORS[b]||"#CBD5E1",items:items.filter(i=>i.brand===b)}));const h=LVL_HEIGHT*0.92;return{loc:l.loc,zone:l.zone,col:l.col,lvl:l.lvl,is_ground:l.is_ground,native_brand:l.brand,native_color:l.color,slices:sl,orig_z:[l.Z,l.Z,l.Z,l.Z,l.Z+h,l.Z+h,l.Z+h,l.Z+h]};});
            
            const tr=[], mx=Math.min(...locs.map(l=>l.X))-25, Mx=Math.max(...locs.map(l=>l.X))+25, my=Math.min(...locs.map(l=>l.Y))-25, My=Math.max(...locs.map(l=>l.Y))+25;
            tr.push({type:'mesh3d',x:[mx,Mx,Mx,mx,mx,Mx,Mx,mx],y:[my,my,My,My,my,my,My,My],z:[-1.5,-1.5,-1.5,-1.5,0,0,0,0],i:[7,0,0,0,4,4,1,1,2,2,3,3],j:[0,1,2,3,5,7,2,5,3,6,0,7],k:[4,4,3,4,6,5,5,6,6,7,7,4],color:'#CBD5E1',opacity:1,showlegend:false,hoverinfo:'skip'});
            
            const bx=[],by=[],bz=[];
            locs.forEach(l=>{const v=['H','J','K','L','M','N','P','Q'].includes(l.zone);let cw,cd,h;if(l.is_ground){cw=2*SHRINK;cd=2*SHRINK;h=LVL_HEIGHT*0.92;}else{cw=(v?DEPTH:COL_WIDTH)*0.47*SHRINK;cd=(v?COL_WIDTH:DEPTH)*0.47*SHRINK;h=LVL_HEIGHT*0.92;}const x0=l.X-cw,x1=l.X+cw,y0=l.Y-cd,y1=l.Y+cd,z0=l.Z,z1=l.Z+h;[[x0,y0,z0,x1,y0,z0],[x1,y0,z0,x1,y1,z0],[x1,y1,z0,x0,y1,z0],[x0,y1,z0,x0,y0,z0],[x0,y0,z1,x1,y0,z1],[x1,y0,z1,x1,y1,z1],[x1,y1,z1,x0,y1,z1],[x0,y1,z1,x0,y0,z1],[x0,y0,z0,x0,y0,z1],[x1,y0,z0,x1,y0,z1],[x1,y1,z0,x1,y1,z1],[x0,y1,z0,x0,y1,z1]].forEach(e=>{bx.push(e[0],e[3],null);by.push(e[1],e[4],null);bz.push(e[2],e[5],null);});});
            tr.push({type:'scatter3d',x:bx,y:by,z:bz,mode:'lines',line:{color:'#1E293B',width:2},hoverinfo:'skip',showlegend:false,name:'_BORDERS_'});
            
            locs.forEach(l=>{const v=['H','J','K','L','M','N','P','Q'].includes(l.zone);let cw,cd,h;if(l.is_ground){cw=2*SHRINK;cd=2*SHRINK;h=LVL_HEIGHT*0.92;}else{cw=(v?DEPTH:COL_WIDTH)*0.47*SHRINK;cd=(v?COL_WIDTH:DEPTH)*0.47*SHRINK;h=LVL_HEIGHT*0.92;}tr.push({type:'mesh3d',x:[l.X-cw,l.X+cw,l.X+cw,l.X-cw,l.X-cw,l.X+cw,l.X+cw,l.X-cw],y:[l.Y-cd,l.Y-cd,l.Y+cd,l.Y+cd,l.Y-cd,l.Y-cd,l.Y+cd,l.Y+cd],z:[l.Z,l.Z,l.Z,l.Z,l.Z+h,l.Z+h,l.Z+h,l.Z+h],name:'_SHELF_CUBE_',i:[7,0,0,0,4,4,1,1,2,2,3,3],j:[0,1,2,3,5,7,2,5,3,6,0,7],k:[4,4,3,4,6,5,5,6,6,7,7,4],color:l.color,customdata:Array(8).fill(l.loc),text:Array(8).fill('库位: '+l.loc),lighting:{ambient:0.7,diffuse:0.85,specular:0.05},flatshading:true,hoverinfo:'text',showlegend:false});if(l.is_ground)tr.push({type:'scatter3d',x:[l.X],y:[l.Y],z:[l.Z+h+0.5],mode:'text',text:[l.loc],textposition:"top center",textfont:{size:12,color:"#0F172A",family:"Arial Black"},showlegend:false,hoverinfo:'skip'});});
            
            const ZM={'A':2,'B':16,'C':2,'D':11,'E':2,'F':7,'G':2,'H':2,'J':6,'K':10,'L':2,'M':6,'N':2,'P':6,'Q':2,'T':2,'W':6,'X':10,'Y':2};
            [...new Set(locs.filter(l=>!l.is_ground).map(l=>l.zone))].forEach(z=>{const ls=locs.filter(l=>l.zone===z&&!l.is_ground);tr.push({type:'scatter3d',x:[ls.reduce((s,l)=>s+l.X,0)/ls.length],y:[ls.reduce((s,l)=>s+l.Y,0)/ls.length],z:[Math.max(...ls.map(l=>l.Z))+LVL_HEIGHT+(ZM[z]||2)],mode:'text',text:[z+'区'],textposition:"top center",textfont:{size:19,color:"#0F172A"},showlegend:false,hoverinfo:'skip'});});
            
            Plotly.newPlot('plotly-div', tr, {autosize:true,margin:{l:0,r:0,b:0,t:0},paper_bgcolor:'#F8FAFC',scene:{xaxis:{visible:false},yaxis:{visible:false},zaxis:{visible:false},aspectmode:'data',camera:{projection:{type:"orthographic"},eye:{x:-0.8,y:-0.8,z:3.5},up:{x:0,y:0,z:1}},hovermode:'closest'},dragmode:"turntable"}, {responsive:true,displayModeBar:true,displaylogo:false,modeBarButtonsToRemove:['toImage','sendDataToCloud'],scrollZoom:true,doubleClick:'reset'});
            applyAllDBCacheToCanvas(); renderControlPanel();
        }
        
        function switchGlobalView(v) { GLOBAL_CURRENT_VIEW=v; document.getElementById("view-plan-btn").className="switch-btn"+(v==='PLAN'?' active':''); document.getElementById("view-actual-btn").className="switch-btn"+(v==='ACTUAL'?' active-actual':''); document.getElementById("legend-panel-title").innerText=v==='PLAN'?"📊 预期规划品牌图例":"🔍 实盘现存品牌清点"; applyAllDBCacheToCanvas(); renderControlPanel(); if(window.innerWidth<=768){const p=document.getElementById('super-legend-panel');if(p.classList.contains('show'))toggleMenu();} }
        
        function renderControlPanel() { const c=document.getElementById("legend-list"); c.innerHTML=""; if(GLOBAL_CURRENT_VIEW==="PLAN") runtime_config.forEach(i=>appendLegendRow(c,i.label,i.color,i.org_name)); else { const ab={}; server_data_cache.forEach(n=>(n.slices||[]).forEach(s=>{if(s.brand&&s.brand!=='[当前空置]'&&s.brand!=='[⚠️超过4品牌严重混放]'){const col=GLOBAL_BRAND_COLORS[s.brand];if(col)ab[s.brand]=col;}})); Object.keys(ab).sort().forEach(b=>appendLegendRow(c,b,ab[b],b)); } }
        
        function appendLegendRow(cont,name,color,org) { const r=document.createElement("div"); r.className="legend-row"; const cb=document.createElement("div"); cb.className="color-box"; cb.style.background=color==='transparent'?'#fff':color; if(isEditMode){cb.title="点击修改颜色";cb.onclick=e=>{e.stopPropagation();const inp=document.createElement('input');inp.type='color';inp.value=color==='transparent'?'#ffffff':color;inp.style.cssText='position:absolute;opacity:0';inp.onchange=()=>updateBrandColor(org||name,inp.value);cb.appendChild(inp);inp.click();};} else {cb.title="只读模式";cb.style.cursor='not-allowed';cb.style.opacity='0.7';} const lb=document.createElement("span"); lb.className="legend-label"; lb.innerText=name; r.appendChild(cb); r.appendChild(lb); if(isEditMode){ ['✏️ 编辑库位','edit-btn',()=>editBrand(org||name)], ['🗑️ 删除品牌','delete-btn',()=>{if(confirm(`确定删除 "${name}"？`))deleteBrand(org||name);}], ['🔄 恢复初始','reset-btn',()=>{if(confirm(`确定恢复 "${name}"？`))resetBrandLocations(org||name);})] ].forEach(([t,cls,fn])=>{const b=document.createElement("button");b.className=`action-btn ${cls}`;b.innerText=t.slice(0,2);b.title=t;b.onclick=e=>{e.stopPropagation();fn();};r.appendChild(b);}); } cont.appendChild(r); }
        
        function editBrand(b) { let l=[]; server_data_cache.forEach(n=>{let c=n.native_brand;if(cell_override_db[n.loc])c=cell_override_db[n.loc].org_name;if(c===b)l.push(n.loc);}); document.getElementById('target-loc').value=formatLocsToRange(l); document.getElementById('new-brand').value=b; const c=runtime_config.find(x=>x.org_name===b||x.label===b); document.getElementById('new-color').value=c&&c.color!=='transparent'?c.color:'#FFFFFF'; document.getElementById('planning-tools-box').scrollIntoView({behavior:'smooth'}); }
        function formatLocsToRange(l) { if(!l.length)return "";const p=l.map(s=>{const m=s.match(/^([A-Z]+)(\d+)-(\d+)$/);return m?{raw:s,z:m[1],c:+m[2],l:+m[3]}:{raw:s,z:s,c:0,l:0};}).sort((a,b)=>a.z.localeCompare(b.z)||a.c-b.c||a.l-b.l);const r=[];let i=0;while(i<p.length){let s=p[i],e=p[i];while(i+1<p.length&&p[i+1].z===s.z&&p[i+1].c===s.c&&p[i+1].l===e.l+1){i++;e=p[i];}r.push(s.raw===e.raw?s.raw:`${s.raw}~${e.raw}`);i++;}return r.join(", "); }
        function parseSinglePattern(pat,id) { pat=pat.trim().toUpperCase(); if(!pat)return false; if(pat.includes('~')||pat.includes('到')){const d=pat.includes('~')?'~':'到';const ps=pat.split(d);if(ps.length===2){const m1=ps[0].trim().match(/^([A-Z]+)(\d+)-(\d+)$/),m2=ps[1].trim().match(/^([A-Z]+)(\d+)-(\d+)$/),ml=id.match(/^([A-Z]+)(\d+)-(\d+)$/);if(m1&&m2&&ml&&ml[1]===m1[1]&&m1[1]===m2[1])return+ml[2]>=Math.min(+m1[2],+m2[2])&&+ml[2]<=Math.max(+m1[2],+m2[2])&&+ml[3]>=Math.min(+m1[3],+m2[3])&&+ml[3]<=Math.max(+m1[3],+m2[3]);}} if(id===pat)return true; if(pat.includes(':')){const p=pat.split(':')[0].trim();if(/^[A-Z]+$/.test(p))return id.startsWith(p);const m=p.match(/^([A-Z]+)(\d+)$/);if(m){const z=id.match(/[A-Z]+/)[0];const c=id.split('-')[0].replace(z,'');return z===m[1]&&+c===+m[2];}} return false; }
        function applyLocationChange() { const r=document.getElementById('target-loc').value.trim(),b=document.getElementById('new-brand').value.trim(),c=document.getElementById('new-color').value; if(!r||!b){alert("请输入库位范围和品牌名");return;} const ps=r.replace(/\n/g,',').replace(/，/g,',').split(','); let ex=runtime_config.some(x=>x.org_name===b||x.label===b); const fo=ex?runtime_config.find(x=>x.label===b||x.org_name===b).org_name:b; if(!ex)runtime_config.push({org_name:b,color:c,label:b}); GLOBAL_BRAND_COLORS[fo]=c; localStorage.setItem("warehouse_twin_master_2026",JSON.stringify(runtime_config)); server_data_cache.forEach(n=>{if(ps.some(p=>parseSinglePattern(p,n.loc)))cell_override_db[n.loc]={org_name:fo,label:b,color:c};}); localStorage.setItem("warehouse_twin_cell_overrides_2026",JSON.stringify(cell_override_db)); document.getElementById('target-loc').value="";document.getElementById('new-brand').value=""; applyAllDBCacheToCanvas();renderControlPanel(); }
        function deleteBrand(n) { runtime_config=runtime_config.filter(c=>c.org_name!==n&&c.label!==n); localStorage.setItem("warehouse_twin_master_2026",JSON.stringify(runtime_config)); for(let l in cell_override_db)if(cell_override_db[l].org_name===n||cell_override_db[l].label===n)delete cell_override_db[l]; localStorage.setItem("warehouse_twin_cell_overrides_2026",JSON.stringify(cell_override_db)); delete GLOBAL_BRAND_COLORS[n]; applyAllDBCacheToCanvas();renderControlPanel(); }
        function resetBrandLocations(b) { server_data_cache.forEach(n=>{let c=n.native_brand;if(cell_override_db[n.loc])c=cell_override_db[n.loc].org_name;if(c===b)delete cell_override_db[n.loc];}); localStorage.setItem("warehouse_twin_cell_overrides_2026",JSON.stringify(cell_override_db)); applyAllDBCacheToCanvas(); }
        function updateBrandColor(b,c) { let cf=runtime_config.find(x=>x.org_name===b||x.label===b); if(cf)cf.color=c; else runtime_config.push({org_name:b,color:c,label:b}); GLOBAL_BRAND_COLORS[b]=c; localStorage.setItem("warehouse_twin_master_2026",JSON.stringify(runtime_config)); for(let l in cell_override_db)if(cell_override_db[l].org_name===b)cell_override_db[l].color=c; localStorage.setItem("warehouse_twin_cell_overrides_2026",JSON.stringify(cell_override_db)); applyAllDBCacheToCanvas();renderControlPanel(); }
        
        function applyAllDBCacheToCanvas() { const gd=document.getElementById('plotly-div'); if(!gd||!gd.data)return; const ot=gd.data,base=[],map={}; for(let i=0;i<ot.length;i++){const t=ot[i];if(t.name==='_SHELF_CUBE_'||t.name==='_DYNAMIC_SLICE_'){if(t.customdata)map[t.customdata[0]]=t;}else base.push(t);} const ft=[...base]; server_data_cache.forEach(n=>{const l=n.loc,tc=map[l];if(!tc)return;const z=l.match(/[A-Z]+/)[0]; if(GLOBAL_CURRENT_VIEW==="PLAN"){let cl=n.native_color,lb=n.native_brand; if(cell_override_db[l]){cl=cell_override_db[l].color;lb=cell_override_db[l].label;}else{const pc=runtime_config.find(x=>x.org_name===n.native_brand);if(pc){cl=pc.color||GLOBAL_BRAND_COLORS[pc.org_name];lb=pc.label;}else{cl=GLOBAL_BRAND_COLORS[n.native_brand]||n.native_color;lb=n.native_brand;}} tc.color=cl==='transparent'?'#FFFFFF':cl; tc.opacity=cl==='transparent'?0:1; tc.name='_SHELF_CUBE_'; tc.z=n.orig_z; tc.text=Array(8).fill(`<b>库位编码: ${l} 【规划分布】</b><br>📍 货架区域: ${z} 货区<br>📦 预设管理品牌: ${lb}`); ft.push(tc); }else{const sl=n.slices||[];const oz=n.orig_z;const mn=Math.min(...oz),mx=Math.max(...oz),fh=mx-mn; for(let s=0;s<sl.length;s++){const cs=sl[s],sh=fh/sl.length,sz=mn+s*sh,ez=sz+sh;const nz=[...oz];for(let v=0;v<8;v++)nz[v]=oz[v]===mn?sz:ez;const sc=GLOBAL_BRAND_COLORS[cs.brand]||cs.color; let h=`<b>库位: ${l} 【实际库存大盘】</b><br>🎨 局部切片品牌: ${cs.brand}<br>----------------------------<br>`; if(!cs.items||!cs.items.length)h+=`<i>🫙 当前格子实盘空置</i>`; else cs.items.forEach(i=>h+=`• <b>SKU</b>: <span style='color:#0F172A;font-weight:bold;'>${i.sku}</span> | <b>数量</b>: ${i.qty} 件<br>`); ft.push({type:'mesh3d',x:tc.x,y:tc.y,z:nz,i:tc.i,j:tc.j,k:tc.k,color:sc,customdata:Array(8).fill(l),text:Array(8).fill(h),name:'_DYNAMIC_SLICE_',lighting:tc.lighting,flatshading:true,hoverinfo:'text',showlegend:false});}} }); gd.data=ft; Plotly.redraw(gd); }
        
        function resetToDefault() { if(!isEditMode){alert("请先切换到编辑模式");return;} if(confirm("确定恢复所有初始规划并清除本地修改？")){localStorage.clear();window.location.reload();} }
        async function refreshData() { const b=document.getElementById('refresh-btn');b.disabled=true;b.innerText='🔄 刷新中...';try{await loadData();document.getElementById('data-timestamp').innerText='数据更新: '+new Date().toLocaleString('zh-CN');lastRefreshTime=Date.now();}catch(e){alert("刷新失败: "+e.message);}finally{b.disabled=false;b.innerText='🔄 刷新数据';} }
        async function loadData() { document.getElementById('loading-overlay').style.display='flex';document.getElementById('loading-text').innerText='正在加载仓库数据...';document.getElementById('error-message').innerText='';try{const[l,d]=await Promise.all([fetchPlanData(),fetchActualData()]);render3D(l,d);document.getElementById('loading-overlay').style.display='none';document.getElementById('data-timestamp').innerText='数据更新: '+new Date().toLocaleString('zh-CN');lastRefreshTime=Date.now();}catch(e){document.getElementById('loading-text').innerText='加载失败';document.getElementById('error-message').innerText=e.message;} }
        
        window.addEventListener('load',async()=>{await loadData();updateEditModeButton();setInterval(()=>{if(Date.now()-lastRefreshTime>=1800000){console.log("⏰ 30分钟已到，自动刷新...");refreshData();}},60000);});
    </script>
