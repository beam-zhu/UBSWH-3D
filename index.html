<!-- ================= 补丁代码开始 ================= -->
<style>
    /* 1. 侧边栏收纳动画 */
    #super-legend-panel.inject-collapsed { 
        transform: translateX(-420px) !important; 
        opacity: 0 !important; 
        pointer-events: none !important; 
        transition: transform 0.3s ease, opacity 0.3s ease !important; 
    }
    @media (max-width: 768px) {
        /* 手机端显示收纳按钮，并调整收起距离 */
        #inject-toggle-sidebar { display: block !important; }
        #super-legend-panel { width: 100% !important; max-width: 380px !important; }
        #super-legend-panel.inject-collapsed { transform: translateX(-100%) !important; }
    }

    /* 2. 右下角模式按钮样式 */
    .inject-mode-btn {
        padding: 10px 16px; border: 1px solid #CBD5E1; background: white; border-radius: 8px;
        cursor: pointer; font-size: 14px; font-weight: bold; color: #475569; transition: all 0.2s;
    }
    .inject-mode-btn.active { background: #3B82F6; color: white; border-color: #2563EB; }
    @media (max-width: 768px) { .inject-mode-btn { padding: 12px 14px; font-size: 16px; } }

    /* 3. 隐藏编辑按钮（直到密码验证通过） */
    .inject-locked-btn { display: none !important; }
</style>

<!-- 手机端左上角：看板收纳按钮 -->
<button id="inject-toggle-sidebar" onclick="toggleInjectSidebar()" style="display:none; position: absolute; top: 20px; left: 20px; z-index: 10001; background: #3B82F6; color: white; border: none; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(59,130,246,0.3);">☰ 看板</button>

<!-- 右下角：模式切换与编辑按钮 -->
<div id="inject-mode-controls" style="position: absolute; bottom: 20px; right: 20px; z-index: 10000; background: rgba(255,255,255,0.95); border-radius: 12px; padding: 8px; box-shadow: 0 4px 20px rgba(15,23,42,0.15); display: flex; gap: 6px; border: 1px solid #E2E8F0;">
    <button class="inject-mode-btn active" id="inject-btn-rotate" onclick="setInjectDragMode('turntable', 'inject-btn-rotate')">🔄 旋转</button>
    <button class="inject-mode-btn" id="inject-btn-pan" onclick="setInjectDragMode('pan', 'inject-btn-pan')">✋ 平移</button>
    <button class="inject-mode-btn" id="inject-btn-edit" onclick="showInjectPasswordModal()" style="background: #FEF3C7; color: #D97706; border-color: #FCD34D;">🔒 编辑</button>
</div>

<!-- 密码验证弹窗 -->
<div id="inject-password-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100002; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 400px; width: 90%; text-align: center;">
        <h3 style="margin-bottom: 10px;">🔐 输入编辑密码</h3>
        <p style="font-size: 12px; color: #64748B; margin-bottom: 15px;">请输入密码以解锁库位修改功能</p>
        <input type="password" id="inject-pwd-input" placeholder="请输入密码" onkeypress="if(event.key==='Enter') verifyInjectPassword()" style="width: 100%; padding: 12px; border: 2px solid #E2E8F0; border-radius: 6px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box;">
        <div>
            <button onclick="closeInjectPasswordModal()" style="padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 0 5px; background: #E2E8F0; color: #64748B;">取消</button>
            <button onclick="verifyInjectPassword()" style="padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 0 5px; background: #3B82F6; color: white;">确认</button>
        </div>
    </div>
</div>

<script>
    // 🌟 密码配置 (默认密码: admin123)
    // 如需修改密码，请在浏览器控制台(F12)运行: generateInjectHash("您的新密码")，然后将输出的哈希值替换到下方
    const INJECT_TARGET_HASH = "240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9"; 
    let isInjectEditMode = false;

    // 1. 看板收纳
    function toggleInjectSidebar() {
        const panel = document.getElementById('super-legend-panel');
        if (panel) panel.classList.toggle('inject-collapsed');
    }

    // 2. 模式切换 (旋转/平移)
    function setInjectDragMode(mode, btnId) {
        var gd = document.getElementsByClassName('plotly-graph-div')[0];
        if (gd) Plotly.relayout(gd, {'scene.dragmode': mode});
        document.querySelectorAll('.inject-mode-btn').forEach(btn => btn.classList.remove('active'));
        if (btnId) document.getElementById(btnId).classList.add('active');
    }

    // 3. 密码弹窗控制
    function showInjectPasswordModal() {
        if (isInjectEditMode) {
            isInjectEditMode = false;
            lockEditButtons();
            document.getElementById('inject-btn-edit').innerText = "🔒 编辑";
            document.getElementById('inject-btn-edit').style.background = "#FEF3C7";
            document.getElementById('inject-btn-edit').style.color = "#D97706";
        } else {
            document.getElementById('inject-password-modal').style.display = 'flex';
            document.getElementById('inject-pwd-input').value = '';
            document.getElementById('inject-pwd-input').focus();
        }
    }
    function closeInjectPasswordModal() { document.getElementById('inject-password-modal').style.display = 'none'; }

    async function verifyInjectPassword() {
        const pwd = document.getElementById('inject-pwd-input').value;
        if (!pwd) return;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        if (hashHex === INJECT_TARGET_HASH) {
            isInjectEditMode = true;
            closeInjectPasswordModal();
            unlockEditButtons();
            document.getElementById('inject-btn-edit').innerText = "🔓 已解锁";
            document.getElementById('inject-btn-edit').style.background = "#10B981";
            document.getElementById('inject-btn-edit').style.color = "white";
        } else { alert('密码错误！'); }
    }

    // 4. 锁定/解锁原有的编辑按钮
    function lockEditButtons() {
        document.querySelectorAll('button').forEach(btn => {
            if (btn.innerText.includes('✏️') || btn.innerText.includes('🗑️') || btn.innerText.includes('🔄')) {
                btn.classList.add('inject-locked-btn');
            }
        });
    }
    function unlockEditButtons() {
        document.querySelectorAll('button').forEach(btn => {
            if (btn.innerText.includes('✏️') || btn.innerText.includes('🗑️') || btn.innerText.includes('🔄')) {
                btn.classList.remove('inject-locked-btn');
            }
        });
    }

    // 5. 页面加载后初始化
    window.addEventListener('load', function() {
        setTimeout(() => {
            lockEditButtons(); // 默认锁定所有编辑按钮
            
            // 🌟 自动开启双指捏合缩放 (无需修改 Python)
            var gd = document.getElementsByClassName('plotly-graph-div')[0];
            if (gd && Plotly.reconfig) {
                Plotly.reconfig(gd, {scrollZoom: true});
            }
        }, 1000); // 延迟 1 秒，确保原有的图例已渲染完毕
    });

    // 🌟 辅助工具：在控制台(F12)运行此函数生成新密码的哈希
    window.generateInjectHash = async function(pwd) {
        const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        console.log("密码 '" + pwd + "' 的哈希值:", hashHex);
        alert("哈希值已输出到控制台(F12)：\n" + hashHex + "\n请将其替换到 HTML 文件中的 INJECT_TARGET_HASH 变量中。");
    }
</script>
<!-- ================= 补丁代码结束 ================= -->
